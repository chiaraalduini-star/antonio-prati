<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antonio Prati – Prati & C. Consulenze Assicurative</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      padding: 2rem 1rem;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      border: 0.5px solid #dde4ef;
      box-shadow: 0 4px 24px rgba(30, 125, 197, 0.10);
    }
    .logo-area {
      padding: 22px 24px 18px;
      border-bottom: 2.5px solid #1e7dc5;
    }
    .logo-area svg {
      width: 190px;
      height: auto;
      display: block;
    }
    .contacts {
      padding: 22px 24px 24px;
    }
    .name {
      font-size: 20px;
      font-weight: 700;
      color: #1a3a6b;
      margin: 0 0 3px;
      font-family: 'Playfair Display', serif;
    }
    .role {
      font-size: 11px;
      color: #1e7dc5;
      font-weight: 500;
      margin: 0 0 18px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .sep {
      height: 1px;
      background: #e0e8f0;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 11px;
      text-decoration: none;
    }
    .row:last-of-type { margin-bottom: 0; }
    .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 1px;
      fill: none;
      stroke: #1e7dc5;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .row span {
      font-size: 13px;
      color: #1a3a6b;
      line-height: 1.5;
    }
    .row span strong { font-weight: 600; }
    .rui {
      font-size: 10px;
      color: #9aaac0;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid #e8eef5;
    }
    .save-btn {
      display: block;
      width: 100%;
      background: #1e7dc5;
      color: #fff;
      border: none;
      padding: 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
      border-top: 0.5px solid #1a6db0;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #1a6db0; }
    .save-btn:active { background: #155a94; }
  </style>
</head>
